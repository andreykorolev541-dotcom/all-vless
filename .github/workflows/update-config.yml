name: Update Working Configs

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Clear old configs
        run: rm -rf configs && mkdir -p configs

      - name: Run collector
        run: python scripts/check_configs.py

      - name: Commit and Push updates
        run: |
          git add configs/vless_plain.txt \
                  configs/vless_base64.txt \
                  configs/vless_ipv6_plain.txt \
                  configs/vless_ipv6_base64.txt \
                  configs/stats.json

          if git diff --cached --quiet; then
            echo "No changes detected. Skipping commit."
          else
            TOTAL=$(python -c "import json; d=json.load(open('configs/stats.json')); print(d['total_configs'])")
            IPV6=$(python -c "import json; d=json.load(open('configs/stats.json')); print(d['ipv6_configs'])")
            git commit -m "chore: auto-update configs [total=$TOTAL ipv6=$IPV6] $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi
