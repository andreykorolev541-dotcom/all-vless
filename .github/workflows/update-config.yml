name: Update Working Configs

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # Жесткая очистка старых файлов, чтобы убрать системный глюк
      - name: Clear old configs
        run: rm -rf configs && mkdir -p configs

      - name: Run collector
        run: python scripts/check_configs.py

      # Форсированное добавление созданных файлов в индекс git
      - name: Commit updated configs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add configs/vless_plain.txt configs/vless_base64.txt configs/stats.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            STATS=$(python -c "import json; d=json.load(open('configs/stats.json')); print(f\"vless={d['total_configs']}\")")
            git commit -m "chore: auto-update configs [$STATS] $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
          
